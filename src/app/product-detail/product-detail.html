@if (product) {
  <div style="direction: rtl; padding: 20px; font-family: Arial, sans-serif;">
    <h2>פרטי מוצר מלאים מהענן</h2>
    <div style="border: 1px solid #ccc; padding: 20px; max-width: 400px; background-color: #f9f9f9; border-radius: 8px;">
      <p><strong>קוד קטגוריה (PK):</strong> {{ product.CategoryCode }}</p>
      <p><strong>מזהה מוצר (SK):</strong> {{ product.ProductId }}</p>
      <p><strong>שם המוצר:</strong> {{ product.ProductName }}</p>
      <p><strong>מחיר:</strong> {{ product.Price }} ש"ח</p>
    </div>
    <br>
    <button (click)="goBack()" style="padding: 10px 20px; cursor: pointer;">חזור לקטלוג</button>
  </div>
}
